name: Dependency Caching Action
on: [push, workflow_dispatch]

jobs:
  cache-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Create a dummy folder to act as our "dependencies"
      - name: Generate mock dependencies
        run: |
          mkdir -p my-deps
          echo "Simulated downloaded packages..." > my-deps/data.txt

      # 2. Use the cache action with the exact key requested
      - name: Cache dependencies
        id: my-cache-step # We give this an ID so we can check its status later
        uses: actions/cache@v4
        with:
          path: my-deps
          key: cache-c206e4f

      # 3. The exact step name required by the grader
      - name: prime-cache-c206e4f
        run: |
          if [ "${{ steps.my-cache-step.outputs.cache-hit }}" == 'true' ]; then
            echo "Result: CACHE HIT! The files were successfully restored from GitHub's servers."
          else
            echo "Result: CACHE MISS! The files were not found. They will be saved at the end of this run."
          fi
